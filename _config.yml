title: Berättelser av en kid
author: Estelle
tagline: av Estelle
description: Berättelser, skrivande och vandringar av Estelle.
lang: sv
url: "https://lelleestelle.github.io"
baseurl: ""

# Bygger med GitHub Pages. Lägg till en text genom att skapa en .md-fil i
# _skrivande, _berattelser, _vandrande eller _projekt. Sidan byggs om automatiskt.

collections:
  skrivande:
    output: true
    permalink: /skrivande/:name/
  berattelser:
    output: true
    permalink: /berattelser/:name/
  vandrande:
    output: true
    permalink: /pa-vandrande-fot/:name/
  projekt:
    output: true
    permalink: /projekt/:name/

defaults:
  - scope:
      path: ""
      type: skrivande
    values:
      layout: piece
      genre: Skrivande
  - scope:
      path: ""
      type: berattelser
    values:
      layout: piece
      genre: Berättelse
  - scope:
      path: ""
      type: vandrande
    values:
      layout: piece
      genre: På vandrande fot
  - scope:
      path: ""
      type: projekt
    values:
      layout: piece
      genre: Projekt

# Sektioner som visas i menyn och på startsidan
sections:
  - title: Skrivande
    collection: skrivande
    url: /skrivande/
    blurb: Texter, tankar och ord.
  - title: Berättelser
    collection: berattelser
    url: /berattelser/
    blurb: Noveller och berättelser.
  - title: På vandrande fot
    collection: vandrande
    url: /pa-vandrande-fot/
    blurb: Resor till fots — i bild och text.
  - title: Projekt
    collection: projekt
    url: /projekt/
    blurb: Pågående och avslutade projekt.

markdown: kramdown
permalink: pretty

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
