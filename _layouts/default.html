<!DOCTYPE html>
<html lang="{{ site.lang | default: 'sv' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% feed_meta %}
  {% seo %}
</head>
<body>
  <a class="skip-link" href="#main">Hoppa till innehåll</a>
  <header class="site-header">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <p class="site-tagline">{{ site.description }}</p>
    <nav class="site-nav" aria-label="Huvudmeny">
      <a href="{{ '/' | relative_url }}">Hem</a>
      {% for s in site.sections %}<a href="{{ s.url | relative_url }}">{{ s.title }}</a>{% endfor %}
      <a href="{{ '/om/' | relative_url }}">Om</a>
    </nav>
  </header>

  <main id="main" class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>© {{ site.time | date: '%Y' }} {{ site.author }}</p>
  </footer>
</body>
</html>
